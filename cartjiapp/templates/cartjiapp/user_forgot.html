<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff6b6b;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #ff4c4c;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            color: #ff6b6b;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Reset Password</h2>

        <form>

            <input type="email" placeholder="Enter your email">

            <button type="submit">Send Reset Link</button>

        </form>

        <div class="link">
            <a href="login.html">Back to Login</a>
        </div>

    </div>

</body>

</html>
