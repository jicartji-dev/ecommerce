<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2d8cf0;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            color: #4facfe;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Create Account</h2>

        <form>

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email" required>

            <input type="password" placeholder="Password" required>

            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Register</button>

        </form>

        <div class="link">
            Already have account? <a href="login.html">Login</a>
        </div>

    </div>

</body>

</html>
