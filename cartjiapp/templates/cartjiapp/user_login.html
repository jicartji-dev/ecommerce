<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            color: #667eea;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Login</h2>

        <form>

            <input type="email" placeholder="Email" required>

            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <div class="link">

            <a href="forgot.html">Forgot Password?</a>

        </div>

        <div class="link">
            Don't have account? <a href="register.html">Register</a>
        </div>

    </div>

</body>

</html>
